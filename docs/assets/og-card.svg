<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B1026"/>
      <stop offset="0.55" stop-color="#141A3C"/>
      <stop offset="1" stop-color="#090C20"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0EA5A3"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="970" cy="315" r="270" fill="url(#glow)"/>

  <!-- constellation grid -->
  <g opacity="0.10" stroke="#C4B5FD">
    <path d="M0 126H1200M0 252H1200M0 378H1200M0 504H1200"/>
    <path d="M150 0V630M300 0V630M450 0V630M600 0V630M750 0V630M900 0V630M1050 0V630"/>
  </g>

  <!-- starfield -->
  <g fill="#FFFFFF">
    <circle cx="120" cy="70" r="1.8" opacity="0.85"/>
    <circle cx="300" cy="120" r="1.3" opacity="0.5"/>
    <circle cx="220" cy="300" r="1.5" opacity="0.6"/>
    <circle cx="520" cy="60" r="1.2" opacity="0.5"/>
    <circle cx="60" cy="210" r="1.4" opacity="0.6"/>
    <circle cx="420" cy="350" r="1.6" opacity="0.7"/>
    <circle cx="700" cy="100" r="1.3" opacity="0.5"/>
    <circle cx="640" cy="330" r="1.4" opacity="0.6"/>
    <circle cx="1150" cy="360" r="1.5" opacity="0.6"/>
    <circle cx="1100" cy="70" r="1.3" opacity="0.5"/>
    <circle cx="860" cy="380" r="1.4" opacity="0.55"/>
    <circle cx="1170" cy="190" r="1.2" opacity="0.5"/>
    <circle cx="160" cy="470" r="1.6" opacity="0.7"/>
    <circle cx="380" cy="520" r="1.3" opacity="0.5"/>
  </g>

  <!-- natal chart wheel -->
  <g stroke="url(#ring)" fill="none" stroke-width="2.4" opacity="0.9">
    <circle cx="970" cy="315" r="172"/>
    <circle cx="970" cy="315" r="142" stroke-opacity="0.6"/>
    <circle cx="970" cy="315" r="46" stroke-opacity="0.45"/>
  </g>
  <g stroke="#A78BFA" stroke-width="1.5" opacity="0.5">
    <line x1="798" y1="315" x2="1142" y2="315"/>
    <line x1="970" y1="143" x2="970" y2="487"/>
    <line x1="848.4" y1="193.4" x2="1091.6" y2="436.6"/>
    <line x1="1091.6" y1="193.4" x2="848.4" y2="436.6"/>
  </g>
  <g stroke-width="2" opacity="0.85">
    <polygon points="970,143 1118.9,401 821.1,401" fill="none" stroke="#0EA5A3" stroke-opacity="0.55"/>
    <line x1="798" y1="315" x2="1142" y2="315" stroke="#FBBF24" stroke-opacity="0.4"/>
  </g>
  <g>
    <circle cx="970" cy="143" r="7" fill="#FBBF24"/>
    <circle cx="1118.9" cy="401" r="7" fill="#0EA5A3"/>
    <circle cx="821.1" cy="401" r="7" fill="#A78BFA"/>
    <circle cx="1142" cy="315" r="5.5" fill="#FDE68A"/>
    <circle cx="798" cy="315" r="5.5" fill="#7C3AED"/>
    <circle cx="970" cy="315" r="4.5" fill="#FFFFFF"/>
  </g>

  <!-- card frame -->
  <rect x="72" y="72" width="1056" height="486" rx="46" fill="none" stroke="#C4B5FD" stroke-opacity="0.14"/>

  <!-- wordmark + copy -->
  <text x="116" y="150" fill="#A78BFA" font-family="Menlo, monospace" font-size="25" font-weight="800" letter-spacing="4">ASTRAL MCP</text>
  <text x="116" y="266" fill="url(#gold)" font-family="Georgia, serif" font-size="74" font-weight="700">Real astrology your</text>
  <text x="116" y="350" fill="#ECE9FB" font-family="Georgia, serif" font-size="74" font-weight="700">AI agent can trust.</text>
  <text x="116" y="424" fill="#C8C4E4" font-family="Avenir, Helvetica, sans-serif" font-size="30">Natal charts · transits · synastry · moon phases</text>

  <!-- chips -->
  <g font-family="Avenir, Helvetica, sans-serif" font-size="22" font-weight="700">
    <rect x="116" y="456" rx="18" ry="18" width="220" height="46" fill="#0EA5A3" fill-opacity="0.16" stroke="#0EA5A3" stroke-opacity="0.4"/>
    <text x="226" y="486" fill="#5EEAD4" text-anchor="middle">dual-engine audit</text>
    <rect x="350" y="456" rx="18" ry="18" width="174" height="46" fill="#7C3AED" fill-opacity="0.2" stroke="#A78BFA" stroke-opacity="0.4"/>
    <text x="437" y="486" fill="#C4B5FD" text-anchor="middle">no API key</text>
  </g>

  <text x="116" y="540" fill="#8A86AE" font-family="'SF Mono', Menlo, monospace" font-size="22">$ npx -y astral-mcp   ·   local-first   ·   open source</text>
