<svg width="980" height="1040" viewBox="0 0 980 1040" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Cinematic Astral MCP product interface</title>
  <desc id="desc">A polished interface card showing a natal chart wheel and a dual-engine precision audit returning a verified status.</desc>
  <defs>
    <radialGradient id="core" cx="50%" cy="40%" r="62%">
      <stop stop-color="#A78BFA" stop-opacity="0.85"/>
      <stop offset="0.3" stop-color="#7C3AED" stop-opacity="0.55"/>
      <stop offset="0.72" stop-color="#0B1026" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#05071A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#C4B5FD" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#C4B5FD" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0EA5A3"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </linearGradient>
    <filter id="blurGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="24" y="24" width="932" height="992" rx="64" fill="#0B1026" stroke="#C4B5FD" stroke-opacity="0.16"/>
  <rect x="52" y="54" width="876" height="932" rx="44" fill="url(#panel)"/>
  <g opacity="0.10" stroke="#C4B5FD">
    <path d="M104 150H876M104 270H876M104 390H876M104 510H876M104 630H876M104 750H876M104 870H876"/>
    <path d="M170 100V924M290 100V924M410 100V924M530 100V924M650 100V924M770 100V924"/>
  </g>

  <!-- starfield -->
  <g fill="#FFFFFF">
    <circle cx="150" cy="130" r="2" opacity="0.8"/>
    <circle cx="820" cy="160" r="1.5" opacity="0.6"/>
    <circle cx="740" cy="100" r="1.6" opacity="0.7"/>
    <circle cx="130" cy="640" r="1.6" opacity="0.6"/>
    <circle cx="850" cy="600" r="1.4" opacity="0.55"/>
    <circle cx="200" cy="860" r="1.5" opacity="0.6"/>
    <circle cx="800" cy="840" r="1.3" opacity="0.5"/>
  </g>

  <!-- glow -->
  <circle cx="490" cy="400" r="304" fill="url(#core)" filter="url(#blurGlow)" opacity="0.85"/>

  <!-- natal chart wheel -->
  <g stroke="url(#ring)" fill="none" stroke-width="2" opacity="0.9">
    <circle cx="490" cy="400" r="244"/>
    <circle cx="490" cy="400" r="200" stroke-opacity="0.6"/>
    <circle cx="490" cy="400" r="64" stroke-opacity="0.5"/>
  </g>
  <!-- house spokes (12) -->
  <g stroke="#A78BFA" stroke-width="1.6" opacity="0.45">
    <line x1="246" y1="400" x2="734" y2="400"/>
    <line x1="490" y1="156" x2="490" y2="644"/>
    <line x1="278.6" y1="278.6" x2="701.4" y2="521.4"/>
    <line x1="701.4" y1="278.6" x2="278.6" y2="521.4"/>
    <line x1="368" y1="188.5" x2="612" y2="611.5"/>
    <line x1="612" y1="188.5" x2="368" y2="611.5"/>
  </g>
  <!-- aspect triangle (trine) + opposition -->
  <g stroke-width="2" opacity="0.9">
    <polygon points="490,156 701.4,521.4 278.6,521.4" fill="none" stroke="#0EA5A3" stroke-opacity="0.6"/>
    <line x1="246" y1="400" x2="734" y2="400" stroke="#FBBF24" stroke-opacity="0.5"/>
  </g>
  <!-- planet dots -->
  <g>
    <circle cx="490" cy="156" r="6" fill="#FBBF24"/>
    <circle cx="701.4" cy="521.4" r="6" fill="#0EA5A3"/>
    <circle cx="278.6" cy="521.4" r="6" fill="#A78BFA"/>
    <circle cx="734" cy="400" r="5" fill="#FDE68A"/>
    <circle cx="246" cy="400" r="5" fill="#7C3AED"/>
    <circle cx="490" cy="400" r="4" fill="#FFFFFF"/>
  </g>

  <g font-family="Avenir, Avenir Next, Helvetica, sans-serif">
    <!-- header chip -->
    <rect x="104" y="108" width="320" height="64" rx="20" fill="#05071A" fill-opacity="0.78" stroke="#C4B5FD" stroke-opacity="0.17"/>
    <text x="128" y="138" fill="#8A86AE" font-size="15" font-weight="900" letter-spacing="2">NATAL CHART</text>
    <text x="128" y="160" fill="#ECE9FB" font-size="15" font-weight="700">23 Feb 1989 · 14:30 · Fortaleza, BR</text>

    <!-- placement chip -->
    <rect x="616" y="124" width="246" height="64" rx="20" fill="#05071A" fill-opacity="0.78" stroke="#C4B5FD" stroke-opacity="0.17"/>
    <text x="640" y="154" fill="#8A86AE" font-size="14" font-weight="900" letter-spacing="2">SUN</text>
    <text x="640" y="176" fill="#FDE68A" font-size="20" font-weight="900">4° Pisces</text>

    <!-- precision audit panel -->
    <rect x="124" y="700" width="346" height="172" rx="28" fill="#05071A" fill-opacity="0.82" stroke="#0EA5A3" stroke-opacity="0.4"/>
    <text x="152" y="744" fill="#8A86AE" font-size="16" font-weight="900" letter-spacing="2">PRECISION AUDIT</text>
    <circle cx="160" cy="788" r="7" fill="#5EEAD4"/>
    <text x="180" y="794" fill="#5EEAD4" font-size="26" font-weight="900">VERIFIED</text>
    <text x="152" y="834" fill="#C8C4E4" font-size="17" font-weight="700">2 ephemerides agree</text>
    <text x="152" y="858" fill="#8A86AE" font-size="15" font-weight="700">max Δ &lt; 0.01° · all signs match</text>

    <!-- reading callout -->
    <rect x="496" y="700" width="360" height="172" rx="32" fill="url(#gold)"/>
    <text x="524" y="744" fill="#2a1c02" font-size="16" font-weight="900" letter-spacing="2">AGENT READING</text>
    <text x="524" y="792" fill="#2a1c02" font-size="30" font-weight="900">Pisces Sun,</text>
    <text x="524" y="828" fill="#2a1c02" font-size="22" font-weight="800">grand trine in water.</text>
    <text x="524" y="856" fill="#2a1c02" font-size="16" font-weight="700">Structured data → your model.</text>

    <!-- command bar -->
    <rect x="164" y="908" width="652" height="54" rx="27" fill="#05071A" fill-opacity="0.8" stroke="#C4B5FD" stroke-opacity="0.16"/>
    <text x="198" y="943" fill="#5EEAD4" font-size="18" font-weight="900" font-family="'SF Mono', Menlo, monospace">npx -y astral-mcp</text>
  </g>
</svg>
