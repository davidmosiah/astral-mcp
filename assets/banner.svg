<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420" role="img" aria-label="Astral MCP — precision-audited astrology for AI agents">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B1026"/>
      <stop offset="0.55" stop-color="#141A3C"/>
      <stop offset="1" stop-color="#090C20"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0EA5A3"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>
  <rect width="1200" height="420" fill="none"/>
  <circle cx="980" cy="200" r="240" fill="url(#glow)"/>

  <!-- starfield -->
  <g fill="#FFFFFF">
    <circle cx="120" cy="70" r="1.6" opacity="0.8"/>
    <circle cx="300" cy="120" r="1.2" opacity="0.5"/>
    <circle cx="220" cy="300" r="1.4" opacity="0.6"/>
    <circle cx="520" cy="60" r="1.1" opacity="0.5"/>
    <circle cx="60" cy="200" r="1.3" opacity="0.6"/>
    <circle cx="420" cy="340" r="1.5" opacity="0.7"/>
    <circle cx="700" cy="100" r="1.2" opacity="0.5"/>
    <circle cx="640" cy="320" r="1.3" opacity="0.6"/>
    <circle cx="1150" cy="350" r="1.4" opacity="0.6"/>
    <circle cx="1100" cy="60" r="1.2" opacity="0.5"/>
    <circle cx="860" cy="360" r="1.3" opacity="0.55"/>
    <circle cx="1170" cy="180" r="1.1" opacity="0.5"/>
  </g>

  <!-- natal chart wheel -->
  <g stroke="url(#ring)" fill="none" stroke-width="1.6" opacity="0.85">
    <circle cx="980" cy="200" r="158"/>
    <circle cx="980" cy="200" r="130" stroke-opacity="0.6"/>
    <circle cx="980" cy="200" r="40" stroke-opacity="0.4"/>
  </g>
  <g stroke="#A78BFA" stroke-width="1.4" opacity="0.7">
    <line x1="1112" y1="200" x2="1138" y2="200"/>
    <line x1="1094.3" y1="266" x2="1116.8" y2="279"/>
    <line x1="1046" y1="314.3" x2="1059" y2="336.8"/>
    <line x1="980" y1="332" x2="980" y2="358"/>
    <line x1="914" y1="314.3" x2="901" y2="336.8"/>
    <line x1="865.7" y1="266" x2="843.2" y2="279"/>
    <line x1="848" y1="200" x2="822" y2="200"/>
    <line x1="865.7" y1="134" x2="843.2" y2="121"/>
    <line x1="914" y1="85.7" x2="901" y2="63.2"/>
    <line x1="980" y1="68" x2="980" y2="42"/>
    <line x1="1046" y1="85.7" x2="1059" y2="63.2"/>
    <line x1="1094.3" y1="134" x2="1116.8" y2="121"/>
  </g>
  <!-- aspect lines (a trine + a square hint) -->
  <g stroke-width="1.4" opacity="0.85">
    <polygon points="980,42 1116.8,279 843.2,279" fill="none" stroke="#0EA5A3" stroke-opacity="0.55"/>
    <line x1="822" y1="200" x2="1138" y2="200" stroke="#FBBF24" stroke-opacity="0.4"/>
  </g>
  <!-- planet dots on the ring -->
  <g>
    <circle cx="980" cy="42" r="4.5" fill="#FBBF24"/>
    <circle cx="1116.8" cy="279" r="4.5" fill="#0EA5A3"/>
    <circle cx="843.2" cy="279" r="4.5" fill="#A78BFA"/>
    <circle cx="1138" cy="200" r="3.6" fill="#FDE68A"/>
    <circle cx="822" cy="200" r="3.6" fill="#7C3AED"/>
    <circle cx="980" cy="200" r="3" fill="#FFFFFF"/>
  </g>

  <!-- wordmark -->
  <text x="80" y="158" font-family="Georgia, 'Times New Roman', serif" font-size="78" font-weight="700" fill="url(#gold)" letter-spacing="1">Astral MCP</text>
  <text x="84" y="206" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="25" fill="#E2E8F0" font-weight="500">Precision-audited astrology for AI agents.</text>
  <text x="84" y="242" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="#94A3B8">Two ephemerides cross-check every chart. No API key, no account.</text>

  <!-- chips -->
  <g font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600">
    <g>
      <rect x="84" y="288" rx="14" ry="14" width="92" height="30" fill="#0EA5A3" opacity="0.18"/>
      <text x="130" y="308" fill="#5EEAD4" text-anchor="middle">natal</text>
    </g>
    <g>
      <rect x="186" y="288" rx="14" ry="14" width="108" height="30" fill="#7C3AED" opacity="0.20"/>
      <text x="240" y="308" fill="#C4B5FD" text-anchor="middle">transits</text>
    </g>
    <g>
      <rect x="304" y="288" rx="14" ry="14" width="116" height="30" fill="#FBBF24" opacity="0.16"/>
      <text x="362" y="308" fill="#FDE68A" text-anchor="middle">synastry</text>
    </g>
    <g>
      <rect x="430" y="288" rx="14" ry="14" width="90" height="30" fill="#38BDF8" opacity="0.16"/>
      <text x="475" y="308" fill="#7DD3FC" text-anchor="middle">moon</text>
    </g>
  </g>

  <text x="84" y="356" font-family="'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace" font-size="17" fill="#64748B">$ npx -y astral-mcp</text>
</svg>
